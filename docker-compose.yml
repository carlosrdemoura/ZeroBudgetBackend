services:
  database:
    container_name: zerobudget-database
    image: postgres:18-alpine
    ports:
      - "5434:5432"
    volumes:
      - database:/var/lib/postgresql
    environment:
      POSTGRES_USER: zerobudget
      POSTGRES_PASSWORD: zerobudget
    networks:
      - zerobudget-network

  zerobudget-api:
    image: ${DOCKER_REGISTRY-}zerobudgetapi
    depends_on:
      - database
    build:
      context: .
      dockerfile: ZeroBudget.Api/Dockerfile
    networks:
      - zerobudget-network

volumes:
  database: {}

networks:
  zerobudget-network:
    driver: bridge
    name: zerobudget-network
