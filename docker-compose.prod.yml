services:
  database:
    container_name: zerobudget-database
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: zerobudget
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: zerobudget
    volumes:
      - database:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zerobudget -d zerobudget"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zerobudget-network

  zerobudget-api:
    container_name: zerobudget-api
    restart: unless-stopped
    build:
      context: .
      dockerfile: ZeroBudget.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=database;Port=5432;Database=zerobudget;Username=zerobudget;Password=${POSTGRES_PASSWORD}"
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ZeroBudget
      Jwt__Audience: ZeroBudget
      Jwt__ExpirationDays: "7"
      Auth__Email: ${AUTH_EMAIL}
      Auth__Password: ${AUTH_PASSWORD}
      CorsAllowedDomains: zerobudget.carlosmoura.net
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - zerobudget-network

volumes:
  database: {}

networks:
  zerobudget-network:
    driver: bridge
    name: zerobudget-network
